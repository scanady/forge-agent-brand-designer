<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Nexus Coach</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --color-primary: #0F766E; --color-primary-dark: #0F172A; --color-white: #FFFFFF;
            --color-teal-50: #F0FDFA; --color-teal-100: #CCFBF1; --color-teal-700: #0F766E;
            --color-accent: #D97706;
            --color-slate-50: #F8FAFC; --color-slate-100: #F1F5F9; --color-slate-200: #E2E8F0;
            --color-slate-300: #CBD5E1; --color-slate-400: #94A3B8; --color-slate-500: #64748B;
            --color-slate-700: #334155; --color-slate-800: #1E293B; --color-slate-900: #0F172A;
            --font-sans: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --text-sm: 0.875rem; --text-base: 1rem; --text-lg: 1.125rem;
            --text-xl: 1.25rem; --text-4xl: 2.25rem;
            --font-medium: 500; --font-semibold: 600; --font-bold: 700;
            --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem; --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem;
            --radius-md: 6px; --radius-lg: 8px;
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-sans); color: var(--color-slate-700); background: var(--color-slate-50); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .error-page { text-align: center; max-width: 480px; padding: var(--space-8); }
        .error-logo { display: flex; align-items: center; gap: var(--space-3); justify-content: center; margin-bottom: var(--space-8); text-decoration: none; }
        .logo-mark { width: 40px; height: 40px; background: var(--color-primary); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; }
        .logo-mark svg { color: var(--color-white); }
        .logo-text { font-size: var(--text-xl); font-weight: var(--font-bold); color: var(--color-slate-900); }
        .error-code { font-size: 6rem; font-weight: 800; color: var(--color-teal-100); line-height: 1; margin-bottom: var(--space-4); }
        .error-icon { width: 64px; height: 64px; border-radius: 50%; background: var(--color-teal-50); display: flex; align-items: center; justify-content: center; margin: 0 auto var(--space-5); }
        .error-icon svg { width: 32px; height: 32px; color: var(--color-teal-700); }
        .error-title { font-size: var(--text-4xl); font-weight: var(--font-bold); color: var(--color-slate-900); margin-bottom: var(--space-3); }
        .error-message { font-size: var(--text-base); color: var(--color-slate-500); margin-bottom: var(--space-8); line-height: 1.6; }

        .error-actions { display: flex; gap: var(--space-3); justify-content: center; flex-wrap: wrap; }
        .btn { display: inline-flex; align-items: center; gap: var(--space-2); padding: 12px var(--space-6); border-radius: var(--radius-md); font-size: var(--text-sm); font-weight: var(--font-semibold); font-family: var(--font-sans); cursor: pointer; transition: all 150ms ease; text-decoration: none; border: none; }
        .btn-cta { background: var(--color-accent); color: var(--color-slate-900); }
        .btn-cta:hover { filter: brightness(1.05); }
        .btn-secondary { background: var(--color-white); color: var(--color-slate-700); border: 1px solid var(--color-slate-200); }
        .btn-secondary:hover { background: var(--color-slate-50); }
        .btn svg { width: 16px; height: 16px; }

        .error-help { margin-top: var(--space-8); padding-top: var(--space-6); border-top: 1px solid var(--color-slate-200); }
        .error-help p { font-size: var(--text-sm); color: var(--color-slate-400); }
        .error-help a { color: var(--color-primary); text-decoration: none; font-weight: var(--font-medium); }
        .error-help a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="error-page">
        <a href="home.html" class="error-logo">
            <div class="logo-mark"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
            <span class="logo-text">Nexus Coach</span>
        </a>

        <div class="error-code">404</div>
        <div class="error-icon"><i data-lucide="compass"></i></div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-message">The page you're looking for doesn't exist or may have been moved. Let's get you back on track.</p>

        <div class="error-actions">
            <a href="home.html" class="btn btn-cta"><i data-lucide="home"></i> Go Home</a>
            <a href="dashboard.html" class="btn btn-secondary"><i data-lucide="layout-dashboard"></i> Dashboard</a>
        </div>

        <div class="error-help">
            <p>Need help? <a href="settings.html">Contact support</a> or check the <a href="home.html">documentation</a>.</p>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
